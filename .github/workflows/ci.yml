name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: this workflow only reads the repo to build & test.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (not a movable tag)
      # so a compromised/retagged release can't silently change what runs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: TypeScript tests (fetch + BFS)
        run: node --test dist/test.js

      - name: Python tests (renderers)
        run: python3 tests/test_render.py
